name: Operational Evidence Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: "15 9 * * 1"

permissions:
  actions: read
  contents: read

jobs:
  capture-evidence:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Capture operational evidence snapshot
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const repo = `${context.repo.owner}/${context.repo.repo}`;
            const now = new Date();
            const date = now.toISOString().slice(0, 10);

            const expectedChecks = [
              "CI / validate-quality",
              "CI / critical-e2e",
              "DB RLS Integration / db-rls-check",
            ];

            const getBranchProtection = async (branch) => {
              try {
                const response = await github.request("GET /repos/{owner}/{repo}/branches/{branch}/protection", {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  branch,
                });

                const contexts = response.data?.required_status_checks?.contexts ?? [];
                const missing = expectedChecks.filter((check) => !contexts.includes(check));
                const extras = contexts.filter((check) => !expectedChecks.includes(check));

                return {
                  branch,
                  configured: true,
                  actualChecks: contexts,
                  missing,
                  extras,
                  ok: missing.length === 0,
                };
              } catch (error) {
                return {
                  branch,
                  configured: false,
                  actualChecks: [],
                  missing: expectedChecks,
                  extras: [],
                  ok: false,
                  error: `${error.status ?? "unknown"} ${error.message}`,
                };
              }
            };

            const getReleaseRuleset = async () => {
              try {
                const response = await github.request("GET /repos/{owner}/{repo}/rulesets", {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                });
                const rulesets = Array.isArray(response.data) ? response.data : [];
                const releaseRule = rulesets.find((ruleset) => {
                  if (ruleset?.target !== "branch") {
                    return false;
                  }
                  const include = ruleset?.conditions?.ref_name?.include;
                  return Array.isArray(include)
                    ? include.some(
                        (value) =>
                          typeof value === "string" &&
                          (value.includes("refs/heads/release/") || value.includes("release/*"))
                      )
                    : false;
                });

                if (!releaseRule) {
                  return {
                    configured: false,
                    rulesetName: null,
                    actualChecks: [],
                    missing: expectedChecks,
                    extras: [],
                    ok: false,
                    error: "release ruleset not found",
                  };
                }

                const requiredStatusRule = (releaseRule.rules ?? []).find(
                  (rule) => rule?.type === "required_status_checks"
                );
                const actualChecks = (requiredStatusRule?.parameters?.required_status_checks ?? [])
                  .map((item) => item?.context)
                  .filter((item) => typeof item === "string");
                const missing = expectedChecks.filter((check) => !actualChecks.includes(check));
                const extras = actualChecks.filter((check) => !expectedChecks.includes(check));

                return {
                  configured: true,
                  rulesetName: releaseRule?.name ?? null,
                  actualChecks,
                  missing,
                  extras,
                  ok: missing.length === 0,
                };
              } catch (error) {
                return {
                  configured: false,
                  rulesetName: null,
                  actualChecks: [],
                  missing: expectedChecks,
                  extras: [],
                  ok: false,
                  error: `${error.status ?? "unknown"} ${error.message}`,
                };
              }
            };

            const getLatestRunByEvent = async (workflowFile, event) => {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                event,
                per_page: 1,
              });
              const run = runs.data.workflow_runs?.[0];
              if (!run) {
                return null;
              }

              return {
                id: run.id,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                branch: run.head_branch,
                createdAt: run.created_at,
                updatedAt: run.updated_at,
                url: run.html_url,
              };
            };

            const getLatestRunForBranchFamily = async (workflowFile, branchFamily) => {
              const runs = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: workflowFile,
                per_page: 100,
              });

              const selected = (runs.data.workflow_runs ?? []).find((run) => {
                const branch = run.head_branch ?? "";
                if (branchFamily === "beta") {
                  return branch === "beta" || branch.startsWith("beta/");
                }
                if (branchFamily === "release") {
                  return branch.startsWith("release/");
                }
                if (branchFamily === "main") {
                  return branch === "main";
                }
                return false;
              });

              if (!selected) {
                return null;
              }

              return {
                id: selected.id,
                event: selected.event,
                status: selected.status,
                conclusion: selected.conclusion,
                branch: selected.head_branch,
                createdAt: selected.created_at,
                updatedAt: selected.updated_at,
                url: selected.html_url,
              };
            };

            const branchProtection = {
              main: await getBranchProtection("main"),
              beta: await getBranchProtection("beta"),
              release_pattern: await getReleaseRuleset(),
            };

            const workflowSnapshots = {
              ci_main: await getLatestRunForBranchFamily("ci.yml", "main"),
              ci_beta: await getLatestRunForBranchFamily("ci.yml", "beta"),
              ci_release: await getLatestRunForBranchFamily("ci.yml", "release"),
              db_rls_nightly: await getLatestRunByEvent("db-rls-integration.yml", "schedule"),
              slo_scheduled: await getLatestRunByEvent("performance-slo-check.yml", "schedule"),
              alerting_probe_scheduled: await getLatestRunByEvent("alerting-health-probe.yml", "schedule"),
              operational_overview_scheduled: await getLatestRunByEvent(
                "operational-quality-overview.yml",
                "schedule"
              ),
            };

            const snapshot = {
              generatedAt: now.toISOString(),
              repo,
              owner: {
                primary: "platform-oncall",
                secondary: "data-oncall",
              },
              branchProtection,
              workflowSnapshots,
              interpretation: {
                branch_protection_ok:
                  branchProtection.main.ok &&
                  branchProtection.beta.ok &&
                  branchProtection.release_pattern.ok,
                scheduled_controls_visible: Boolean(
                  workflowSnapshots.db_rls_nightly ||
                    workflowSnapshots.slo_scheduled ||
                    workflowSnapshots.alerting_probe_scheduled
                ),
              },
              notes: [
                "Snapshot evidencia continua: no reemplaza evidencia pre-release formal.",
                "Si branch protection devuelve 403/errores, clasificar governance no-conclusivo/hold.",
              ],
            };

            const outputDir = path.join(process.cwd(), "tmp", "ops");
            fs.mkdirSync(outputDir, { recursive: true });

            const jsonPath = path.join(outputDir, `operational-evidence-snapshot-${date}.json`);
            fs.writeFileSync(jsonPath, JSON.stringify(snapshot, null, 2), "utf8");

            const mdPath = path.join(outputDir, `operational-evidence-snapshot-${date}.md`);
            const asStatus = (run) => {
              if (!run) {
                return "no-conclusive";
              }
              return run.conclusion ?? run.status ?? "unknown";
            };

            const markdown = [
              `# Operational evidence snapshot ${date}`,
              "",
              `- Repo: ${repo}`,
              `- Generated at: ${now.toISOString()}`,
              "",
              "## Branch protection",
              "",
              `- main: ok=${branchProtection.main.ok} configured=${branchProtection.main.configured}`,
              `- beta: ok=${branchProtection.beta.ok} configured=${branchProtection.beta.configured}`,
              `- release/*: ok=${branchProtection.release_pattern.ok} configured=${branchProtection.release_pattern.configured}`,
              "",
              "## Scheduled controls",
              "",
              `- db-rls-integration(schedule): ${asStatus(workflowSnapshots.db_rls_nightly)}`,
              `- performance-slo-check(schedule): ${asStatus(workflowSnapshots.slo_scheduled)}`,
              `- alerting-health-probe(schedule): ${asStatus(workflowSnapshots.alerting_probe_scheduled)}`,
              `- operational-quality-overview(schedule): ${asStatus(workflowSnapshots.operational_overview_scheduled)}`,
              "",
              "## Branch snapshots",
              "",
              `- CI main: ${asStatus(workflowSnapshots.ci_main)}`,
              `- CI beta: ${asStatus(workflowSnapshots.ci_beta)}`,
              `- CI release/*: ${asStatus(workflowSnapshots.ci_release)}`,
              "",
              "Reference JSON:",
              `- ${path.relative(process.cwd(), jsonPath).replaceAll("\\", "/")}`,
            ].join("\n");

            fs.writeFileSync(mdPath, markdown, "utf8");

            core.summary
              .addHeading("Operational Evidence Snapshot")
              .addRaw("\n")
              .addRaw(`- JSON: ${path.relative(process.cwd(), jsonPath).replaceAll("\\", "/")}\n`)
              .addRaw(`- Markdown: ${path.relative(process.cwd(), mdPath).replaceAll("\\", "/")}\n`)
              .addRaw(`- Branch protection aligned: ${snapshot.interpretation.branch_protection_ok}\n`)
              .addRaw(`- Scheduled controls visible: ${snapshot.interpretation.scheduled_controls_visible}\n`)
              .write();

      - name: Upload operational evidence snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operational-evidence-snapshot-${{ github.run_id }}
          path: |
            tmp/ops/operational-evidence-snapshot-*.json
            tmp/ops/operational-evidence-snapshot-*.md
          if-no-files-found: error
          retention-days: 45
